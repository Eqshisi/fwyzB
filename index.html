<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防伪验证</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#0F3460',
        secondary: '#1A3A8F',
        accent: '#533483',
        neutral: '#F5F5F7',
        'neutral-dark': '#E4E4E7',
      },
      fontFamily: {
        sans: ['Inter', 'system-ui', 'sans-serif'],
      },
    }
  }
}
</script>
<style type="text/tailwindcss">
@layer utilities {
  .card-shadow {
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
  }
}
html,body{height:100%}
body{
  background:url('img/bg.png') center/cover no-repeat fixed;
}
@media (min-width:1025px){
  body{
    background:url('img/bg.png') left top/100% 100% no-repeat fixed;
  }
}
</style>
</head>
<body class="flex flex-col min-h-screen font-sans text-gray-800">

<header class="bg-primary/80 backdrop-blur-sm text-white shadow-md">
  <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
    <h1 class="text-xl md:text-2xl font-bold">防伪验证系统</h1>
  </div>
</header>

<main class="flex-1 container mx-auto px-4 py-8 max-w-5xl;">
  <section class="bg-white/80 backdrop-blur-sm rounded-lg p-6 card-shadow text-center">
    <div class="mb-4">
      <img src="img/ok.png" alt="验证通过" class="inline-block h-25 w-25">
    </div>
    <h2 class="text-2xl font-bold text-green-600 mb-2">验证通过</h2>
    <p class="text-gray-600 mb-6">二维码有效</p>

<div style="text-align: left; margin: 0px;line-height: 1.4;">
  <p style="margin:0;">委托项目: 审计报告</p>
  <p style="margin:0;">审计编号: ZD-R5619</p>

  <div style="display: flex; margin:0; line-height: 1.4;">
    <span style="width: auto;">被审计单位:</span>
    <span style="flex: 1; text-align: center;">聚点新能源（浙江）有限公司</span>
  </div>

  <p style="margin:0;">报告日期: 2026.03.04</p>
</div>

    <br>
    <div class="bg-green-50/80 p-4 rounded-lg inline-block">
      <p class="text-green-700 font-medium">北京正得会计师事务所(普通合伙)</p>
      <p class="text-green-700 font-medium">ZD-R5619 该报告防伪码验证有效</p>
    </div>
  </section>
</main>

<footer class="bg-primary/80 backdrop-blur-sm text-white mt-12 py-6">
  <div class="container mx-auto px-4 text-center">
    <p>会计师事务所报告防伪验证系统</p>
  </div>
</footer>

</body>
</html>
